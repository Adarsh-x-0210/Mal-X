<!DOCTYPE html>
<html>
<head>
    <title>Mal-X Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #020617, #0f172a);
            color: #e2e8f0;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 20px;
        }

        /* Upload */
        .upload-area {
            border: 2px dashed #38bdf8;
            padding: 40px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-area:hover {
            background: #0f172a;
        }

        /* File info */
        #fileInfo {
            text-align: center;
            margin-top: 10px;
            color: #94a3b8;
        }

        /* Button */
        .btn {
            display: block;
            margin: 20px auto;
            background: #38bdf8;
            color: black;
            padding: 12px 30px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background: #0ea5e9;
        }

        /* Spinner */
        #spinner {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loader {
            border: 5px solid #1e293b;
            border-top: 5px solid #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin: auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Summary cards */
        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .summary-card {
            background: #0f172a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 8px rgba(56,189,248,0.1);
        }

        /* Result */
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
        }

        .safe { border-left: 5px solid #22c55e; }
        .danger { border-left: 5px solid #ef4444; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 6px;
        }

        .low { background: #22c55e; }
        .medium { background: #f59e0b; }
        .high { background: #ef4444; }
        .critical { background: #7f1d1d; }

        .tag {
            display: inline-block;
            background: #1e293b;
            padding: 5px 10px;
            border-radius: 6px;
            margin: 3px;
            font-size: 0.85em;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🛡️ Mal-X Threat Analyzer</h1>

    <!-- Upload -->
    <div class="upload-area" onclick="fileInput.click()">
        Upload File for Analysis
        <input type="file" id="fileInput" hidden>
    </div>

    <!-- File Info -->
    <div id="fileInfo"></div>

    <!-- Button -->
    <button class="btn" onclick="scanFile()" id="scanBtn" disabled>Scan File</button>

    <!-- Spinner -->
    <div id="spinner">
        <div class="loader"></div>
        <p>Scanning file...</p>
    </div>

    <!-- Summary -->
    <div class="summary" id="summary" style="display:none;">
        <div class="summary-card">
            <p>Risk Level</p>
            <h2 id="risk"></h2>
        </div>
        <div class="summary-card">
            <p>Confidence</p>
            <h2 id="confidence"></h2>
        </div>
        <div class="summary-card">
            <p>Score</p>
            <h2 id="score"></h2>
        </div>
    </div>

    <!-- Result -->
    <div id="result"></div>

</div>

<script>

let file;

const fileInput = document.getElementById('fileInput');
const scanBtn = document.getElementById('scanBtn');

fileInput.addEventListener('change', e => {
    file = e.target.files[0];
    scanBtn.disabled = false;

    document.getElementById('fileInfo').innerText =
        `Selected: ${file.name} (${(file.size/1024).toFixed(2)} KB)`;
});

function scanFile(){
    if(!file) return;

    document.getElementById('spinner').style.display = "block";
    document.getElementById('result').innerHTML = "";
    document.getElementById('summary').style.display = "none";

    const formData = new FormData();
    formData.append('file', file);

    fetch('/scan',{
        method:'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        showResult(data);
    })
    .finally(() => {
        document.getElementById('spinner').style.display = "none";
    });
}

function showResult(data){

    const risk = data.verdict.risk.toLowerCase();

    document.getElementById('summary').style.display = "grid";
    document.getElementById('risk').innerText = data.verdict.risk;
    document.getElementById('confidence').innerText = data.verdict.confidence + "%";
    document.getElementById('score').innerText = data.analysis.score;

    document.getElementById('result').innerHTML = `
        <div class="result ${data.verdict.malicious ? 'danger' : 'safe'}">

            <h2>${data.verdict.malicious ? '❌ Threat Detected' : '✅ File Safe'}</h2>

            <div class="grid">

                <div class="card">
                    <b>File Info</b><br>
                    Name: ${data.file.name}<br>
                    Size: ${(data.file.size/1024).toFixed(2)} KB<br>
                    Extension: ${data.file.extension}
                </div>

                <div class="card">
                    <b>Hashes</b><br>
                    MD5: ${data.hashes.md5}<br>
                    SHA256: ${data.hashes.sha256}
                </div>

            </div>

            <div class="card">
                <b>Indicators</b><br>
                ${data.indicators.length 
                    ? data.indicators.map(i => `<span class="tag">${i}</span>`).join("") 
                    : "No suspicious indicators"}
            </div>

        </div>
    `;
}

</script>

</body>
</html>
